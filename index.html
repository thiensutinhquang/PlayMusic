<!DOCTYPE html>
<html lang="vi" data-theme="lucbao">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1b2d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="MSTQ Music" />
  <title>MSTQ Music – Nghe nhạc liên tục</title>

  <!-- PWA Link -->
  <link id="manifest-link" rel="manifest" href="/PlayMusic/manifest.webmanifest">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 UMD -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <style>
    :root,[data-theme]{transition:color .25s ease,background-color .25s ease}
    :root{
      --bg:#0b132b;--card:#0f1b2d;--text:#eaf2ff;--muted:#93a3b8;
      --primary:#f59e0b;--primary-fg:#0b132b;--ring:#f59e0b66;
      --border:#203047;--nav-bg:rgba(16,24,40,.88);--shadow:0 12px 36px rgba(0,0,0,.28);
      --gradient:linear-gradient(135deg,#60a5fa 0%,#f59e0b 100%);
      --active-bg: rgba(245, 158, 11, 0.12);
    }
    [data-theme=light]{--bg:#f6f7fb;--card:#ffffff;--text:#0f172a;--muted:#64748b;--primary:#0ea5e9;--primary-fg:#ffffff;--ring:#0ea5e955;--border:#e5e7eb;--nav-bg:rgba(255,255,255,.92);--active-bg: rgba(14, 165, 233, 0.08);}
    [data-theme=lucbao]{--bg:#081414;--card:#102424;--text:#e0f2f1;--muted:#80cbc4;--primary:#f4ff81;--primary-fg:#0c1113;--ring:#f4ff8166;--border:color-mix(in srgb,var(--text) 10%, transparent);--nav-bg:rgba(16,36,36,.86);--active-bg: rgba(244, 255, 129, 0.1);}
    
    .btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);background:var(--card);color:var(--text);padding:.6rem .9rem;border-radius:14px;transition:background-color .15s,transform .1s}
    .btn:active{transform:scale(0.98);opacity:.8} 
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn-primary{background:var(--primary);color:var(--primary-fg);border-color:transparent}
    .chip{font-size:.72rem;border:1px solid var(--border);padding:.15rem .45rem;border-radius:999px;color:var(--muted)}
    
    .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;backdrop-filter:blur(8px);background:var(--nav-bg);border-top:1px solid var(--border)}
    .tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:.55rem 0;font-size:.74rem;color:var(--muted);transition:color .2s}
    .tabbtn[aria-current=true]{color:var(--text)}
    .safe-bottom{padding-bottom:calc(env(safe-area-inset-bottom) + 10px)}
    
    input[type="range"]{-webkit-appearance:none;appearance:none;height:6px;width:100%;background:var(--muted);border-radius:999px}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:var(--primary);cursor:pointer}
    input[type="range"]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--primary);cursor:pointer}
    
    .dropdown{position:relative; display: inline-block;}
    .dropdown-menu{
        position:absolute; right:0; top:100%; margin-top:.5rem; 
        background:var(--card); border:1px solid var(--border); 
        border-radius:14px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); 
        min-width:220px; z-index:100; padding:.5rem; 
        animation:fadeIn .15s ease-out; transform-origin: top right;
    }
    .dropdown-item{display:flex;align-items:center;gap:.6rem;padding:.75rem .8rem;border-radius:10px;transition:background-color .1s; font-weight: 500; font-size: 0.95rem; color: var(--text); text-decoration: none;}
    .dropdown-item:active{background-color:var(--primary); color: var(--primary-fg);}
    
    @keyframes slideUp { from {transform: translateY(100%);} to {transform: translateY(0);} }
    @keyframes fadeIn { from {opacity: 0; transform: scale(0.95);} to {opacity: 1; transform: scale(1);} }
    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

    .song-row {
        display: flex; align-items: center;
        padding: 0 12px;
        height: 58px;
        border-bottom: 1px solid var(--border);
        transition: background-color 0.2s;
        cursor: pointer;
    }
    .song-row:active { background-color: var(--border); }
    .song-row.active { background-color: var(--active-bg); }
    .song-row.active .song-idx { color: var(--primary); font-weight: bold; animation: pulse 2s infinite; }
    
    .icon-btn-mini {
        width: 32px; height: 32px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 50%;
        transition: all 0.2s;
        color: var(--muted);
    }
    .icon-btn-mini:active { background-color: var(--border); transform: scale(0.9); }

    .toast-container {
        position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
        z-index: 2000; pointer-events: none;
        width: 90%; max-width: 380px;
        text-align: center;
    }
    .toast-tet {
        background: linear-gradient(135deg, #d32f2f, #b71c1c);
        color: #ffff00;
        border: 2px solid #ffeb3b;
        padding: 14px 20px;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(211, 47, 47, 0.6);
        font-weight: 600;
        font-size: 0.95rem;
        animation: toastSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: inline-block;
        pointer-events: auto;
    }
    @keyframes toastSlide { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body class="bg-[var(--bg)] text-[var(--text)] font-sans">
  <div id="root"></div>

  <!-- NATIVE AUDIO: Đứng tĩnh tại đây. -->
  <audio id="mstq-player" preload="auto" playsinline webkit-playsinline crossOrigin="anonymous"></audio>

  <script>
    (function(){
      const show=(m)=>{
        const str = String(m||'');
        if(str.includes('AbortError') || str.includes('NotAllowedError') || str.includes('Interrupted')) return;
      };
      window.addEventListener('error',e=>show(e.error||e.message||e));
      window.addEventListener('unhandledrejection',e=>show(e.reason||e));
    })();
  </script>

  <script type="text/javascript">
    const { useState, useEffect, useRef, useCallback, createElement: e } = React;

    const SONGS_CACHE_KEY='mstq_songs_v45';
    const RESUME_KEY='mstq_resume_v45'; 
    const THEME_KEY='music-theme', SPEED_KEY='mstq_speed', MUTED_KEY='mstq_muted';
    const SHUFFLE_KEY='mstq_shuffle', REPEAT_KEY='mstq_repeat';
    const POWER_KEY='mstq_power_save', TIMER_KEY='mstq_sleep_timer', STOP_END_KEY='mstq_stop_at_end';
    const SRC_PREF_KEY='mstq_sources_pref'; 
    const COMPRESSOR_KEY='mstq_compressor_on';
    const INITIAL_VISIBLE=120, VISIBLE_STEP=160;

    const isMobileOS = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    
    const save=(k,v)=>{
        try{ 
            if (document.visibilityState === 'hidden' && k !== TIMER_KEY) return; 
            localStorage.setItem(k,JSON.stringify(v));
        }catch{}
    };
    const load=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}};
    const clamp=(x,min,max)=>Math.min(Math.max(x,min),max);
    const formatTime=s=>{if(!isFinite(s)||s<0)return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return`${m}:${String(sec).padStart(2,'0')}`};
    const sanitizeRepeat=(r)=> (r==='off'||r==='all'||r==='one')?r:'all';
    const haptic=(ms=14)=>{ try{ navigator.vibrate?.(ms); }catch{} };

    // WAKELOCK: Chống HĐH ngủ
    let wakeLock = null;
    const requestWakeLock = async () => {
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } 
            catch (err) {}
        }
    };
    const releaseWakeLock = () => {
        if (wakeLock !== null) {
            wakeLock.release().then(() => { wakeLock = null; }).catch(()=>{});
        }
    };

    const Icon = ({d=22,p="M5 12h14"}) => e('svg', {width:d, height:d, viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:"1.7"},
      e('path', {d:p, strokeLinecap:"round", strokeLinejoin:"round"})
    );

    const ICON_URL = 'https://raw.githubusercontent.com/thiensutinhquang/PlayMusic/main/images/icons/icon-192x192.png';
    const LOGO_FALLBACK_URL = ICON_URL;
    const LOGO_PLACEHOLDER = 'https://placehold.co/24x24/102424/e0f2f1?text=MSTQ';

    const Icons={
      home:(d)=>e(Icon, {d:d, p:"M3 10.5 12 3l9 7.5v8.5a1.5 1.5 0 0 1-1.5 1.5H4.5A1.5 1.5 0 0 1 3 19V10.5Z"}),
      search:(d)=>e(Icon, {d:d, p:"M21 21l-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"}),
      lib:(d)=>e(Icon, {d:d, p:"M4 19h16M6 17V5a2 2 0 0 1 2-2h0M12 17V3h0M18 17V7a2 2 0 0 0-2-2h0"}),
      queue:(d)=>e(Icon, {d:d, p:"M4 6h16M4 12h10M4 18h7"}),
      settings:(d)=>e(Icon, {d:d, p:"M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7Z M19.4 15l1.1 1.9-1.7 3-2.2-.4-.9 1.9h-3.4l-.9-1.9-2.2.4-1.7-3 1.1-1.9Z"}),
      play:(d)=>e(Icon, {d:d, p:"M8 5v14l11-7z"}), pause:(d)=>e(Icon, {d:d, p:"M6 5h4v14H6zM14 5h4v14h-4z"}),
      next:(d)=>e(Icon, {d:d, p:"M13 5 20 12l-7 7V5z M4 5h2v14H4z"}),
      back:(d)=>e(Icon, {d:d, p:"M11 19 4 12l7-7v14z M18 5h2v14h-2z"}),
      more:(d)=>e(Icon, {d:d, p:"M6 12h.01M12 12h.01M18 12h.01"}),
      repeat:(d)=>e(Icon, {d:d, p:"M17 1v4H7a5 5 0 0 0 0 10h1M7 23v-4h10a5 5 0 0 0 0-10h-1"}),
      shuffle:(d)=>e(Icon, {d:d, p:"M4 4l7 7-7 7M15 4h5M20 4l-6 6M15 20h5M20 20l-6-6"}),
      download:(d)=>e(Icon, {d:d, p:"M12 3v12m0 0l4-4m-4 4-4-4M5 21h14"}),
      share:(d)=>e('svg', {width:d, height:d, viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round"},
        e('circle', {cx:"18", cy:"5", r:"3"}),
        e('circle', {cx:"6", cy:"12", r:"3"}),
        e('circle', {cx:"18", cy:"19", r:"3"}),
        e('line', {x1:"8.59", y1:"13.51", x2:"15.42", y2:"17.49"}),
        e('line', {x1:"15.41", y1:"6.51", x2:"8.59", y2:"10.49"})
      )
    };

    const TopBar = ({ title, askInstall, linksOpen, setLinksOpen, setTheme }) => {
        const SimpleLinkDropdown = e('div', {className: "dropdown", onClick: (e) => e.stopPropagation()}, 
            e('button', {className: "btn", onClick: ()=>{haptic();setLinksOpen(o=>!o)}}, "Liên kết ▾"),
            linksOpen && e('div', {className: "dropdown-menu"}, 
                e('a', {className: "dropdown-item", href: "https://thiensutinhquang.github.io/home/", target: "_blank", rel: "noopener"}, "🏠 Trang chủ"),
                e('a', {className: "dropdown-item", href: "https://thiensutinhquang.github.io/PlayMusic/", target: "_blank", rel: "noopener"}, "🎵 Play Nhạc"),
                e('hr', {className: "my-1 border-[var(--border)]"}),
                e('div', {className: "px-2 py-1 text-[var(--muted)] text-xs font-semibold"}, "Nền tảng"),
                e('a', {className: "dropdown-item", href: "https://www.youtube.com/@ThiensuTinhQuang", target: "_blank", rel: "noopener"}, "▶️ YouTube"),
                e('a', {className: "dropdown-item", href: "https://www.tiktok.com/@minhsutinhquang", target: "_blank", rel: "noopener"}, "🎶 TikTok"),
                e('a', {className: "dropdown-item", href: "https://www.facebook.com/groups/minhsutinhquang", target: "_blank", rel: "noopener"}, "👥 Facebook Group"),
                e('a', {className: "dropdown-item", href: "https://t.me/Giaoly_phap_don_ngo", target: "_blank", rel: "noopener"}, "💬 Telegram"),
                e('a', {className: "dropdown-item", href: "https://zalo.me/g/dukrae245", target: "_blank", rel: "noopener"}, "📱 Zalo")
            )
        );
        
        const LogoElement = e('img', {
            src: LOGO_FALLBACK_URL, 
            width: "24", height: "24", 
            className: "rounded-md", 
            alt: "MSTQ logo",
            onError: (e) => { e.target.src = LOGO_PLACEHOLDER; e.target.onError = null; }
        });

        return e('header', {className: "fixed top-0 inset-x-0 z-30 px-4 py-3 flex items-center justify-between bg-[var(--nav-bg)] backdrop-blur-lg border-b border-[var(--border)]"},
          e('div', {className: "flex items-center gap-2"},
            LogoElement, 
            e('h1', {className: "font-semibold"}, title)
          ),
          e('div', {className: "flex items-center gap-2"},
            e('button', {className: "btn", onClick: askInstall}, "Cài đặt ứng dụng"),
            SimpleLinkDropdown, 
            e('button', {className: "btn", onClick: ()=>{haptic();setTheme(t=>t==='lucbao'?'light':'lucbao')}}, "Chủ đề")
          )
        );
    };

    function App(){
      const [tab,setTab]=useState('home');
      const [theme,setTheme]=useState(localStorage.getItem(THEME_KEY)||'lucbao');
      useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);localStorage.setItem(THEME_KEY,theme);},[theme]);

      const [needsStart,setNeedsStart]=useState(true);
      const [startCountdown, setStartCountdown] = useState(4); 
      const [linksOpen,setLinksOpen]=useState(false);
      const [toast, setToast] = useState(null);

      useEffect(() => {
          if (toast) {
              const timer = setTimeout(() => setToast(null), 3500);
              return () => clearTimeout(timer);
          }
      }, [toast]);
      
      const askInstall = async () => { 
        haptic(); 
        if (window.pwaEngine) {
            window.pwaEngine.handleInstallClick();
        } else {
            alert("Vui lòng mở menu trình duyệt chọn 'Thêm vào màn hình chính' (Add to Home Screen).");
        }
      };

      const [playlist,setPlaylist]=useState([]);
      const [loading,setLoading]=useState(true);
      const [visible,setVisible]=useState(INITIAL_VISIBLE);
      const [filter,setFilter]=useState('');
      const [sourcePref,setSourcePref]=useState(load(SRC_PREF_KEY,{archive:true,custom:false,customText:""}));
      useEffect(()=>save(SRC_PREF_KEY,sourcePref),[sourcePref]);

      const [currentIndex,setCurrentIndex]=useState(0);
      const [playing,setPlaying]=useState(false);
      const [progress,setProgress]=useState({current:0,duration:0});
      const [shuffle,setShuffle]=useState(load(SHUFFLE_KEY,false));
      const [repeat,setRepeat]=useState(sanitizeRepeat(load(REPEAT_KEY,'all')));
      const [stopAtEnd,setStopAtEnd]=useState(load(STOP_END_KEY,false));
      const [upNext,setUpNext]=useState([]);
      
      const playlistRef = useRef(playlist); useEffect(()=>{playlistRef.current=playlist},[playlist]);
      const currentIndexRef = useRef(currentIndex); 
      const shuffleRef = useRef(shuffle); useEffect(()=>{shuffleRef.current=shuffle; save(SHUFFLE_KEY,shuffle);},[shuffle]);
      const repeatRef = useRef(repeat); useEffect(()=>{repeatRef.current=repeat; save(REPEAT_KEY,repeat);},[repeat]);
      const stopAtEndRef = useRef(stopAtEnd); useEffect(()=>{stopAtEndRef.current=stopAtEnd; save(STOP_END_KEY,stopAtEnd);},[stopAtEnd]);
      const upNextRef = useRef(upNext); useEffect(()=>{upNextRef.current=upNext},[upNext]);

      const enqueueNext=(s)=>{ haptic(); setUpNext(q=> q.includes(s.id)? q : [...q,s.id]); };
      const moveUp=(id)=>{ haptic(); setUpNext(q=>{ const i=q.indexOf(id); if(i<=0) return q; const a=q.slice(); [a[i-1],a[i]]=[a[i],a[i-1]]; return a; }); };
      const moveDown=(id)=>{ haptic(); setUpNext(q=>{ const i=q.indexOf(id); if(i<0||i===q.length-1) return q; const a=q.slice(); [a[i+1],a[i]]=[a[i],a[i+1]]; return a; }); };
      const removeFromQueue=(id)=>{ haptic(); setUpNext(q=>q.filter(x=>x!==id)); };
      const clearQueue=()=>{ haptic(); setUpNext([]); };

      const audioRef=useRef(null);
      useEffect(()=>{ 
          audioRef.current=document.getElementById('mstq-player'); 
      },[]);

      const [volume,setVolume]=useState(load(RESUME_KEY,{volume:.9}).volume??.9);
      const [playbackRate,setPlaybackRate]=useState(parseFloat(localStorage.getItem(SPEED_KEY)||'1')||1);
      const [muted,setMuted]=useState(localStorage.getItem(MUTED_KEY)==='1');
      const [compressorOn,setCompressorOn]=useState(load(COMPRESSOR_KEY,true));

      const audioCtxRef=useRef(null), gainRef=useRef(null), compNodeRef=useRef(null);
      
      const ensureAudioContext = () => {
        if (isMobileOS) return; 
        try{
          if(!audioCtxRef.current){
            const ctx=new (window.AudioContext||window.webkitAudioContext)({latencyHint:'playback'});
            const gain=ctx.createGain(); gain.gain.value=1;
            const comp=ctx.createDynamicsCompressor();
            comp.threshold.value=-18; comp.knee.value=24; comp.ratio.value=6; comp.attack.value=0.008; comp.release.value=0.25;
            const src=ctx.createMediaElementSource(audioRef.current);
            src.connect(gain);
            if(compressorOn){ gain.connect(comp).connect(ctx.destination); } 
            else { gain.connect(ctx.destination); }
            audioCtxRef.current=ctx; gainRef.current=gain; compNodeRef.current=comp;
          }
          if (audioCtxRef.current.state === 'suspended') {
             audioCtxRef.current.resume();
          }
        }catch(e){}
      };
      
      useEffect(()=>{ try{
        if(audioCtxRef.current && gainRef.current){
          gainRef.current.disconnect();
          const dst=audioCtxRef.current.destination;
          if(compressorOn && !isMobileOS){ gainRef.current.connect(compNodeRef.current).connect(dst); }
          else { gainRef.current.connect(dst); }
        }}catch{} 
      },[compressorOn]);

      useEffect(()=>{
          if(audioRef.current) { audioRef.current.volume=volume; audioRef.current.playbackRate=playbackRate; audioRef.current.muted=muted; }
          localStorage.setItem(SPEED_KEY,String(playbackRate));
          localStorage.setItem(MUTED_KEY,muted?'1':'0');
      },[volume, playbackRate, muted]);

      const [powerSave,setPowerSave]=useState(load(POWER_KEY,false));
      useEffect(()=>save(POWER_KEY,powerSave),[powerSave]);
      const [timerLeft,setTimerLeft]=useState(load(TIMER_KEY,null));
      const timerRef=useRef(null);
      const startSleepTimer=(ms)=>{
        haptic();
        clearInterval(timerRef.current);
        const end=Date.now()+ms; setTimerLeft(ms); save(TIMER_KEY,ms);
        timerRef.current=setInterval(()=>{ const left=end-Date.now(); if(left<=0){ clearInterval(timerRef.current); setTimerLeft(null); save(TIMER_KEY,null); pauseAll(); } else setTimerLeft(left); },1000);
      };
      const cancelSleepTimer=()=>{ haptic(); clearInterval(timerRef.current); setTimerLeft(null); save(TIMER_KEY,null);};
      useEffect(()=>{ const v=load(TIMER_KEY,null); if(v&&v>0) startSleepTimer(v); return()=>clearInterval(timerRef.current); },[]);

      const parseCustom=(txt)=>{
        const lines=txt.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
        const out=[]; let last="";
        for(const ln of lines){
          if(ln.startsWith('#EXTINF:')){ 
              last=ln.split(',').slice(1).join(',').trim(); 
          } else if(/^https?:\/\//i.test(ln)){
              out.push({id:ln,title:last||ln.split('/').pop(),artist:'Custom',stream_url:ln,artwork:ICON_URL,duration:0,lyrics:'',item_identifier:'custom'}); 
              last="";
          }
        }
        return out;
      };

      const refetch=useCallback(async()=>{
        setLoading(true);
        try{
          let all=[];
          if(sourcePref.archive!==false){
            const queries=[
              'uploader:(tinhquang) AND mediatype:(audio)',
              'uploader:(thiensutinhquang) AND mediatype:(audio)',
              'creator:("Minh Su Tinh Quang") AND mediatype:(audio)'
            ];
            let docs=[];let ok=false;
            for(const q of queries){
              const url=`https://archive.org/advancedsearch.php?q=${encodeURIComponent(q)}&fl[]=identifier,title,creator,description&sort[]=publicdate+desc&rows=200&page=1&output=json`;
              const r=await fetch(url,{cache:'no-store'}); if(!r.ok) continue;
              const j=await r.json(); const list=j?.response?.docs||[]; if(list.length){docs=list;ok=true;break;}
            }
            if(ok){
              for(const d of docs){
                try{
                  const meta=await fetch(`https://archive.org/metadata/${d.identifier}`,{cache:'no-store'}).then(r=>r.json());
                  (meta.files||[]).forEach(f=>{
                    if(String(f.format||'').toUpperCase().includes('MP3')){
                      all.push({id:`${d.identifier}/${f.name}`,title:(f.title||d.title||f.name||'').replace(/\.mp3$/i,'').replace(/_/g,' ').trim(),artist:d.creator||'TinhQuang',stream_url:`https://archive.org/download/${d.identifier}/${encodeURIComponent(f.name)}`,artwork:`https://archive.org/download/${d.identifier}/__ia_thumb.jpg`,duration:parseFloat(f.length||0)||0,lyrics:d.description||'',item_identifier:d.identifier});
                    }
                  });
                }catch{}
              }
            }
          }
          if(sourcePref.custom && sourcePref.customText?.trim()){
            all=[...all, ...parseCustom(sourcePref.customText)];
          }
          if(all.length > 0) {
              setPlaylist(all);
              save(SONGS_CACHE_KEY,all);
          } else {
              throw new Error("Empty list");
          }
        }catch{
          const cached=load(SONGS_CACHE_KEY,[]);
          if(cached && cached.length > 0) setPlaylist(cached);
        }
        setLoading(false);
      },[sourcePref]);
      
      useEffect(()=>{refetch()},[]);

      const current=playlist[currentIndex]||null;

      const updateMediaSessionMeta = useCallback((song) => {
          if (!song || !('mediaSession' in navigator)) return;
          try {
              navigator.mediaSession.metadata = new MediaMetadata({
                  title: song.title,
                  artist: song.artist || 'minhsutinhquang',
                  artwork: [{src: song.artwork || ICON_URL, sizes: '512x512', type: 'image/png'}]
              });
          } catch(e) {}
      }, []);

      const updatePositionState = (a) => {
          if ('mediaSession' in navigator && 'setPositionState' in navigator.mediaSession) {
              if (a && !isNaN(a.duration) && !isNaN(a.currentTime) && isFinite(a.duration) && a.duration > 0) {
                  try {
                      navigator.mediaSession.setPositionState({
                          duration: a.duration,
                          playbackRate: a.playbackRate,
                          position: a.currentTime
                      });
                  } catch(e) {}
              }
          }
      };

      const getNextIndexLogic = (currentIdx) => {
          const pl = playlistRef.current;
          const shuf = shuffleRef.current;
          const un = upNextRef.current;
          
          if (!pl.length) return currentIdx;
          
          if (un.length > 0) {
              const nextId = un[0];
              const idx = pl.findIndex(x => x.id === nextId);
              if (idx >= 0) return idx;
          } 
          if (shuf) {
              let nextIdx = Math.floor(Math.random() * pl.length);
              if (nextIdx === currentIdx && pl.length > 1) {
                  nextIdx = (nextIdx + 1) % pl.length;
              }
              return nextIdx;
          }
          return (currentIdx + 1) % pl.length;
      };

      const getPrevIndexLogic = (currentIdx) => {
           const pl = playlistRef.current;
           if (!pl.length) return currentIdx;
           return (currentIdx - 1 + pl.length) % pl.length;
      };

      const lastMediaSessionUpdateRef = useRef(0);
      const lastUiUpdateRef = useRef(0);
      const isTransitioningRef = useRef(false);

      // =========================================================================
      // CÔNG NGHỆ LÕI V25: THE RAM-DRIVE (BLOB PRELOADER) CHỐNG MIUI KILL MẠNG
      // =========================================================================
      const preloadedBlobRef = useRef({ id: null, url: null });

      const preloadNextTrack = async (nextSong) => {
          if (!nextSong || !isMobileOS) return; // Chỉ làm trên mobile
          if (preloadedBlobRef.current.id === nextSong.id) return; // Đã tải rồi
          
          try {
              console.log("[RAM-Drive] Đang kéo bài tiếp theo vào bộ nhớ RAM...");
              const response = await fetch(nextSong.stream_url); // Dùng CORS chuẩn, không dùng no-cors
              if (!response.ok) throw new Error("Lỗi tải mạng");
              
              const blob = await response.blob();
              const objectUrl = URL.createObjectURL(blob);
              
              // Xóa RAM bài cũ nếu có
              if (preloadedBlobRef.current.url) {
                  URL.revokeObjectURL(preloadedBlobRef.current.url);
              }
              
              preloadedBlobRef.current = { id: nextSong.id, url: objectUrl };
              console.log("[RAM-Drive] Đã nạp đạn xong. Sẵn sàng bắn khi tắt màn hình.");
          } catch(e) {
              console.log("[RAM-Drive] Lỗi tải trước:", e);
              // Lỗi thì thôi, lát nữa playNativeSync sẽ tự fetch link gốc
              preloadedBlobRef.current = { id: null, url: null };
          }
      };

      // =========================================================================
      // NATIVE PLAY: Ép Rửa Trôi Bằng Súc Rửa Nguồn (Súc ruột phần cứng)
      // =========================================================================
      const playNativeSync = (i) => {
        const a = audioRef.current; 
        if(!a) return;
        
        const pl = playlistRef.current;
        const s = pl[i]; if(!s) return; 
        
        isTransitioningRef.current = true;
        currentIndexRef.current = i;
        
        if (document.visibilityState === 'visible') {
            setCurrentIndex(i); 
            setPlaying(true); 
        }

        updateMediaSessionMeta(s);
        
        // 1. TẠM DỪNG VÀ SÚC RỬA (FLUSH DECODER)
        a.pause();
        a.src = '';
        a.load(); // Ép phần cứng xả sạch cặn của bài cũ
        
        // 2. TÌM NGUỒN PHÁT: Lấy trong RAM (Blob) nếu có, không thì lấy trên mạng
        let targetUrl = s.stream_url;
        if (preloadedBlobRef.current.id === s.id && preloadedBlobRef.current.url) {
            targetUrl = preloadedBlobRef.current.url;
            console.log("[Trình Phát] Đang phát từ RAM-Drive. Bất tử mạng!");
        } else {
            console.log("[Trình Phát] Đang phát từ Internet.");
        }
        
        // 3. NẠP NGUỒN MỚI VÀ ÉP RESET LẦN 2
        a.loop = false; 
        a.src = targetUrl; 
        a.load(); // Khởi tạo lại luồng Hardware Decoder chuẩn chỉnh
        
        // 4. PHÁT VÀ NẠP BÀI TIẾP THEO
        const playPromise = a.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                isTransitioningRef.current = false;
                requestWakeLock();
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
                
                // Ngay khi bài này hát thành công, tranh thủ CPU đang thức, tải luôn bài kế tiếp!
                const nextIdx = getNextIndexLogic(i);
                const nextSong = pl[nextIdx];
                if (nextSong) preloadNextTrack(nextSong);

            }).catch(e => {
                console.warn("Autoplay blocked/Network Stalled:", e);
                isTransitioningRef.current = false;
                
                // Nếu bị kẹt mạng, thử súc rửa kéo lại lần nữa
                setTimeout(() => {
                    a.src = ''; a.load();
                    a.src = s.stream_url; a.load();
                    a.play().catch(()=>{});
                }, 1000);
                
                if (document.visibilityState === 'visible') setPlaying(false); 
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
            });
        }
        
        if (!isMobileOS) ensureAudioContext();
      }; 

      // =========================================================================
      // KHẮC PHỤC LIỆT NÚT PLAY/PAUSE (THE DE-GHOSTING PROTOCOL)
      // =========================================================================
      const handlePlayForcefully = () => {
          const a = document.getElementById('mstq-player');
          if (a) {
              // Nếu đang bị Bóng ma (thanh chạy nhưng không tiếng, readyState thấp)
              if (a.readyState < 3 && a.currentTime > 0) {
                  console.log("🛠️ Phát hiện Bóng Ma (Ghost Audio). Đang ép súc rửa trình phát...");
                  const currentUrl = a.src;
                  a.src = ''; a.load(); // Súc rửa
                  a.src = currentUrl; a.load(); // Nạp lại
              }
              
              a.play().catch(() => { 
                  // Cứu vãn cuối cùng nếu vẫn lỗi
                  a.load(); a.play().catch(()=>{}); 
              });
              
              if (document.visibilityState === 'visible') setPlaying(true);
              if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
              requestWakeLock();
          }
      };

      const playPauseUI = useCallback(() => {
          haptic();
          const a = audioRef.current; if(!a) return;
          if(!playlistRef.current.length) return;
          if(!current && playlistRef.current.length){ playNativeSync(0); setNeedsStart(false); return; }

          if(playing || (!a.paused && a.currentTime > 0)){ 
            if (document.visibilityState === 'visible') setPlaying(false); 
            a.pause(); 
            releaseWakeLock();
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
          }
          else{ 
            setNeedsStart(false); 
            handlePlayForcefully(); // Gọi giao thức ép chạy
          }
      }, [current, playing]);

      const pickSong = (s) => { 
          haptic(); 
          const i = playlistRef.current.findIndex(x => x.id === s.id); 
          if(i >= 0) playNativeSync(i); 
      };

      // =========================================================================
      // GIAO THỨC CHUYỂN BÀI SỚM (EARLY SWAP) - Đánh lừa MIUI
      // =========================================================================
      useEffect(()=>{
        const a = audioRef.current; 
        if(!a) return;
        
        const onTime = (e) => { 
          const target = e.target;
          if(isNaN(target.duration) || target.duration <= 0) return;
          
          if (document.visibilityState === 'visible') {
              const now = Date.now();
              if (now - lastUiUpdateRef.current > 500) {
                 setProgress({current: target.currentTime, duration: target.duration});
                 lastUiUpdateRef.current = now;
              }
          }
          
          const currentSec = Math.floor(target.currentTime);
          if (currentSec !== lastMediaSessionUpdateRef.current) {
              updatePositionState(target); 
              lastMediaSessionUpdateRef.current = currentSec;
          }

          // EARLY SWAP: Chuyển bài trước khi HĐH kịp thấy 00:00
          if (target.duration > 2 && target.currentTime >= target.duration - 0.5) {
              if (!isTransitioningRef.current) {
                  isTransitioningRef.current = true;
                  
                  const idx = currentIndexRef.current;
                  const nextIdx = getNextIndexLogic(idx);
                  
                  const pl = playlistRef.current;
                  const rep = repeatRef.current;
                  const stopE = stopAtEndRef.current;
                  const un = upNextRef.current;
                  
                  if (un.length > 0) {
                      upNextRef.current = un.slice(1);
                      if (document.visibilityState === 'visible') setUpNext(upNextRef.current); 
                  }

                  if (stopE || (rep === 'off' && !un.length && nextIdx === 0 && idx === pl.length - 1)) {
                      target.pause();
                      isTransitioningRef.current = false;
                      if (document.visibilityState === 'visible') setPlaying(false);
                      releaseWakeLock();
                      if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
                      return;
                  }

                  playNativeSync(nextIdx);
              }
          }
        };

        const onEndedNative = () => {
            if (repeatRef.current === 'one') {
                a.currentTime = 0;
                a.play().catch(()=>{});
                return;
            }
            if (!isTransitioningRef.current) {
                 const nextIdx = getNextIndexLogic(currentIndexRef.current);
                 playNativeSync(nextIdx);
            }
        };

        const onPause = (e) => { 
             if(playlistRef.current[currentIndexRef.current] && document.visibilityState === 'visible') {
                 const s = playlistRef.current[currentIndexRef.current];
                 save(RESUME_KEY,{index:currentIndexRef.current,id:s.id,currentTime:e.target.currentTime||0,volume:e.target.volume,rate:e.target.playbackRate,muted:e.target.muted,playing:false});
             }
        };

        const onError = (e) => {
            console.error("Audio Hardware Error:", e);
            if (!isTransitioningRef.current) {
                 const nextIdx = getNextIndexLogic(currentIndexRef.current);
                 playNativeSync(nextIdx);
            }
        };
        
        a.addEventListener('timeupdate',onTime);
        a.addEventListener('ended',onEndedNative);
        a.addEventListener('pause',onPause);
        a.addEventListener('error',onError);
        
        return()=>{
            a.removeEventListener('timeupdate',onTime);
            a.removeEventListener('ended',onEndedNative);
            a.removeEventListener('pause',onPause);
            a.removeEventListener('error',onError);
        };
      },[]); 

      // =========================================================================
      // BỌC THÉP API MÀN HÌNH KHÓA (CHỐNG VĂNG APP)
      // =========================================================================
      useEffect(()=>{
        if(!('mediaSession' in navigator)) return;

        const handlePause = () => {
            const a = document.getElementById('mstq-player');
            if (a) {
                a.pause();
                if (document.visibilityState === 'visible') setPlaying(false);
                navigator.mediaSession.playbackState = 'paused';
                releaseWakeLock();
            }
        };

        const handleNext = () => {
            if (!isTransitioningRef.current) {
                const nextIdx = getNextIndexLogic(currentIndexRef.current);
                playNativeSync(nextIdx);
            }
        };

        const handlePrev = () => {
            if (!isTransitioningRef.current) {
                const a = document.getElementById('mstq-player');
                // Nếu thẻ bị lỗi (readyState 0), cấm tua, chuyển thẳng về bài trước
                if (a && a.readyState >= 2 && a.currentTime > 3) {
                    a.currentTime = 0;
                } else {
                    const prevIdx = getPrevIndexLogic(currentIndexRef.current);
                    playNativeSync(prevIdx);
                }
            }
        };

        try{
          navigator.mediaSession.setActionHandler('play', handlePlayForcefully);
          navigator.mediaSession.setActionHandler('pause', handlePause);
          navigator.mediaSession.setActionHandler('nexttrack', handleNext);
          navigator.mediaSession.setActionHandler('previoustrack', handlePrev);
        }catch(e){}
      },[]);

      // Khôi phục bài cũ
      useEffect(()=>{
        const r=load(RESUME_KEY,null);
        if(r&&playlist.length){
          const idx=Math.min(Math.max(0,r.index||0),playlist.length-1);
          setCurrentIndex(idx);
          currentIndexRef.current = idx;
          
          setTimeout(()=>{ 
              const s=playlist[idx]; if(!s) return;
              const a = audioRef.current; if(!a) return;
              
              if(a.src!==s.stream_url){ a.src=s.stream_url; }
              a.currentTime=Number(r.currentTime||0); 
              a.volume=r.volume??volume; 
              a.playbackRate=r.rate??playbackRate; 
              a.muted=false;
              
              if(r.playing){ 
                  setPlaying(true); 
                  a.play().catch(()=>{}); 
                  requestWakeLock(); 
              }
              
              // Khởi động preloader cho bài đầu tiên luôn
              const nextIdx = getNextIndexLogic(idx);
              preloadNextTrack(playlist[nextIdx]);
              
          },0);
        }
      },[playlist.length]); 

      async function shareTrack(s){
        haptic();
        try{
          if(navigator.share){
            await navigator.share({title:s.title, text:`Nghe: ${s.title} – ${s.artist||''}`, url:s.stream_url});
          }else{
            await navigator.clipboard.writeText(s.stream_url);
            const tempMsg = document.createElement('div');
            tempMsg.className = 'fixed bottom-[110px] left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-lg z-[1000] opacity-0 transition-opacity duration-300';
            tempMsg.textContent = 'Đã sao chép link phát vào bộ nhớ tạm.';
            document.body.appendChild(tempMsg);
            setTimeout(() => { tempMsg.style.opacity = 1; }, 10);
            setTimeout(() => { tempMsg.style.opacity = 0; tempMsg.addEventListener('transitionend', () => tempMsg.remove()); }, 2000);
          }
        }catch{}
      }

      async function downloadTrack(s) {
        haptic();
        setToast(`🧧 Đang chuẩn bị tải: "${s.title}"...`);
        try {
            if(!s.stream_url) throw new Error("No URL");
            const response = await fetch(s.stream_url);
            if (!response.ok) throw new Error('Network error');
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `${s.title.replace(/[\/\\:*?"<>|]/g, '')}.mp3`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
            setToast('✅ Đã tải xong! Chúc bạn nghe nhạc vui vẻ.');
        } catch (e) {
            setToast('⚠️ Đang chuyển hướng để tải...');
            setTimeout(() => {
                const a = document.createElement('a');
                a.href = s.stream_url;
                a.download = '';
                a.target = '_blank';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }, 800);
        }
      }

      const handleManualStart = () => {
          haptic();
          setNeedsStart(false); 
          if (playlistRef.current.length > 0) {
              playNativeSync(currentIndexRef.current);
          }
      };

      useEffect(() => {
          let timer;
          if (needsStart && !loading) {
              if (startCountdown > 0) {
                  timer = setTimeout(() => setStartCountdown(c => c - 1), 1000);
              } else if (startCountdown === 0) {
                  setNeedsStart(false);
                  setTimeout(() => {
                      if (playlistRef.current.length > 0) {
                          playNativeSync(currentIndexRef.current);
                      }
                  }, 50);
              }
          }
          return () => clearTimeout(timer);
      }, [needsStart, loading, startCountdown]);

      const HomeTab=()=>{
        const list = filter.trim()
          ? playlist.filter(s => (s.title||'').toLowerCase().includes(filter.toLowerCase()) || (s.artist||'').toLowerCase().includes(filter.toLowerCase()))
          : playlist;

        const lastAutoScrollId = useRef(null);
        
        useEffect(() => {
            if(current?.id && (lastAutoScrollId.current !== current.id || tab === 'home')) {
                const el = document.getElementById(`song-${current.id}`);
                if(el) {
                   setTimeout(() => {
                       el.scrollIntoView({behavior: 'smooth', block: 'center'});
                       lastAutoScrollId.current = current.id;
                   }, 300);
                }
            }
        }, [current?.id, tab]);

        const SongItem = (s, index) => {
            const isCurrent = currentIndexRef.current === playlist.findIndex(x => x.id === s.id);
            return e('div', {
                key: s.id, 
                id: `song-${s.id}`,
                className: `song-row ${isCurrent ? 'active' : ''}`,
                onClick: () => pickSong(s) 
            },
              e('div', {className: `w-8 text-center flex-shrink-0 text-xs font-mono mr-2 ${isCurrent ? 'song-idx' : 'text-[var(--muted)]'}`},
                  isCurrent ? "▶" : (index + 1)
              ),
              e('div', {className: "flex-1 min-w-0 flex flex-col justify-center pr-2"}, 
                e('div', {className: `truncate text-[0.92rem] ${isCurrent ? 'text-[var(--primary)] font-semibold' : 'text-[var(--text)]'}`}, s.title||'Untitled'),
                e('div', {className: "truncate text-xs text-[var(--muted)] opacity-80 mt-0.5"}, s.artist||'minhsutinhquang')
              ),
              e('div', {className: "flex items-center gap-1 flex-shrink-0"},
                  e('button', {
                    className: "icon-btn-mini", style: { color: isCurrent ? 'var(--primary)' : '#818cf8' },
                    onClick: (e)=>{ e.stopPropagation(); shareTrack(s); }
                  }, e(Icons.share, {d:17})),
                  
                  e('div', {className: "flex flex-col items-center justify-center px-2 mx-1 border-l border-r border-[var(--border)] h-8"},
                    e('span', {className: "text-[10px] font-mono text-[var(--muted)]"}, formatTime(s.duration||0))
                  ),
                  
                  e('button', {
                    className: "icon-btn-mini", style: { color: '#ef4444' },
                    onClick: (e)=>{ e.stopPropagation(); downloadTrack(s); }
                  }, e(Icons.download, {d:17}))
              )
            );
        };

        return e('div', {className: "px-0 pb-24 pt-14"},
          e('div', {className: "px-3 py-2 flex items-center gap-2 sticky top-14 z-20 bg-[var(--bg)]/95 backdrop-blur-md border-b border-[var(--border)]"},
            e('input', {className: "flex-1 bg-[var(--card)] text-sm border border-[var(--border)] rounded-full py-2 px-4 focus:ring-1 focus:ring-[var(--primary)] focus:outline-none", placeholder: "Tìm nhanh...", value: filter, onChange: e=>setFilter(e.target.value)}),
            filter && e('button', {className: "text-xs px-3 py-1.5 bg-[var(--card)] border border-[var(--border)] rounded-full", onClick: ()=>{haptic();setFilter('');setVisible(INITIAL_VISIBLE)}}, "Xoá")
          ),
          loading?(
            e('div', {className: "animate-pulse space-y-3 p-4"}, Array.from({length:6}).map((_,i)=>e('div', {key:i, className: "h-12 rounded bg-[var(--card)]/40"})))
          ):(
            e(React.Fragment, null,
              e('div', {className: "space-y-0"}, list.slice(0,visible).map((s, index) => SongItem(s, index))), 
              list.length>visible && e('button', {onClick: ()=>{haptic();setVisible(v=>Math.min(list.length,v+VISIBLE_STEP))}, className: "btn w-full mt-3"}, "Tải thêm")
            )
          )
        );
      };

      const SearchTab=()=>{
        const [kw,setKw]=useState(''); const [busy,setBusy]=useState(false);
        const runQuery=async(q,sort='downloads+desc')=>{
          haptic(); setBusy(true);
          try{
            const url=`https://archive.org/advancedsearch.php?q=${encodeURIComponent(q)}&fl[]=identifier,title,creator,description&sort[]=${encodeURIComponent(sort)}&rows=120&page=1&output=json`;
            const r=await fetch(url,{cache:'no-store'}); const j=await r.json();
            const docs=j?.response?.docs||[]; const out=[];
            for(const d of docs){
              try{
                const meta=await fetch(`https://archive.org/metadata/${d.identifier}`,{cache:'no-store'}).then(r=>r.json());
                (meta.files||[]).forEach(f=>{
                  if(String(f.format||'').toUpperCase().includes('MP3')){
                    out.push({id:`${d.identifier}/${f.name}`,title:(f.title||d.title||f.name||'').replace(/\.mp3$/i,'').replace(/_/g,' ').trim(),artist:d.creator||'Archive',stream_url:`https://archive.org/download/${d.identifier}/${encodeURIComponent(f.name)}`,artwork:`https://archive.org/download/${d.identifier}/__ia_thumb.jpg`,duration:parseFloat(f.length||0)||0,lyrics:d.description||'',item_identifier:d.identifier});
                  }
                });
              }catch{}
            }
            if(out.length){ setPlaylist(out); setVisible(INITIAL_VISIBLE); setTab('home'); setFilter(''); }
          }catch{} setBusy(false);
        };
        const quick=[{label:'Mới nhất',q:'mediatype:(audio)',sort:'publicdate+desc'},{label:'Phổ biến',q:'mediatype:(audio)',sort:'downloads+desc'},{label:'Pháp thoại',q:'"Minh Su Tinh Quang" mediatype:(audio)',sort:'downloads+desc'}];
        return e('div', {className: "px-4 py-3 pt-16"},
          e('div', {className: "flex gap-2"},
            e('input', {className: "flex-1 bg-[var(--card)] border border-[var(--border)] rounded-xl p-2 focus:ring-2 focus:ring-[var(--primary)] focus:outline-none", placeholder: "Tìm trên Archive.org...", value: kw, onChange: e=>setKw(e.target.value)}),
            e('button', {className: "btn btn-primary", onClick: ()=>runQuery(`${kw} AND mediatype:(audio)`), disabled:!kw||busy}, busy?'Đang tìm…':'Tìm')
          ),
          e('div', {className: "flex gap-2 mt-3 flex-wrap"},
            quick.map(x=>e('button', {key:x.label, className: "btn", onClick: ()=>runQuery(x.q,x.sort)}, x.label))
          )
        );
      };

      const SettingsTab=()=>e('div', {className: "px-4 py-3 space-y-6 pt-16"},
        e('div', {className: "p-3 rounded-2xl border border-[var(--border)]"},
          e('div', {className: "flex items-center justify-between mb-3"},
            e('h3', {className: "font-semibold text-lg"}, "Giao diện"),
            e('span', {className: "chip"}, theme)
          ),
          e('div', {className: "grid grid-cols-3 gap-3"},
            [['Tối','dark'],['Sáng','light'],['Lục Bảo','lucbao']].map(([label,code])=>
              e('button', {key:code, onClick:()=>{haptic();setTheme(code)}, className: `w-full text-left p-4 rounded-2xl border border-[var(--border)] ${theme===code?'ring-2 ring-[var(--ring)]':''}`},
                e('div', {className: "font-semibold"}, label),
                e('div', {className: "text-xs text-[var(--muted)]"}, code)
              )
            )
          )
        ),
        e('div', {className: "p-3 rounded-2xl border border-[var(--border)]"},
          e('h3', {className: "font-semibold mb-2"}, "Cấu hình HĐH (Quan Trọng)"),
          e('div', {className: "p-3 bg-amber-50 border border-amber-200 rounded-xl mb-3"},
             e('p', {className: "text-sm text-amber-900 font-semibold"}, "Để nhạc chạy ngầm khi tắt màn hình trên Xiaomi/Android:"),

          ),
           e('p', {className: "text-xs text-emerald-500 mt-2 font-semibold leading-relaxed"}, "✓ Chế độ Di động: Hệ thống kích hoạt GIAO THỨC RAM-DRIVE HOT-SWAP. Bài hát được nạp trước vào RAM. Nút Play/Pause tự động súc rửa phần cứng bị kẹt nếu HĐH Xiaomi gây lỗi câm loa.")
        ),
        e('div', {className: "p-3 rounded-2xl border border-[var(--border)]"},
          e('h3', {className: "font-semibold mb-3"}, "Hẹn giờ tắt nhạc"),
          e('div', {className: "grid grid-cols-3 gap-2"},
            [15,30,45,60,90,120].map(m=>e('button', {key:m, className: "btn", onClick:()=>startSleepTimer(m*60*1000)}, `${m} phút`))
          ),
          e('div', {className: "flex items-center gap-3 mt-3"},
            e('span', {className: "chip"}, timerLeft?`Còn: ${formatTime(Math.ceil(timerLeft/1000))}`:'Không đặt'),
            timerLeft && e('button', {className: "btn", onClick:cancelSleepTimer}, "Huỷ hẹn giờ"),
            e('label', {className: "flex items-center gap-2 ml-auto"},
              e('input', {type:"checkbox", checked:!!stopAtEnd, onChange:e=>{haptic();setStopAtEnd(e.target.checked)}}), " Dừng khi hết bài"
            )
          )
        ),
        e('div', {className: "p-3 rounded-2xl border border-[var(--border)]"},
          e('h3', {className: "font-semibold mb-2"}, "Dữ liệu & Đồng bộ"),
          e('div', {className: "flex flex-col gap-2"},
            e('button', {className: "btn", onClick:()=>{haptic();refetch()}}, "Làm mới danh sách nhạc"),

              haptic();

              try{ localStorage.clear(); }catch{}
              location.reload();
            }, style:{background:'#2a1313',borderColor:'#6b1d1d',color:'#fff'}}, "Xóa Cache & Làm mới tất cả")
          )
        )
      );

      const QueueTab=()=>{ const items=upNext.map(id=>playlist.find(s=>s.id===id)).filter(Boolean);
        return e('div', {className: "px-4 py-3 pt-16"},
          e('div', {className: "flex items-center justify-between mb-2"},
            e('h2', {className: "text-lg font-semibold"}, "Hàng đợi “Phát tiếp theo”"),
            e('div', {className: "flex gap-2"}, e('span', {className: "chip"}, `${items.length} mục`), items.length>0 && e('button', {className: "btn", onClick:()=>{haptic();clearQueue()}}, "Xoá hết"))
          ),

                )

      };

      const [showNowPlaying,setShowNowPlaying]=useState(false);
      const NowPlaying=()=>{
        const activeCurrent = playlistRef.current[currentIndexRef.current] || null;
        if(!activeCurrent) return null;
        
        const a=audioRef.current;
        const onSeek=(e)=>{ 
          if(!a||!isFinite(a.duration)) return; 
          // Nếu thẻ đang bị kẹt (readyState < 2), cấm tua để tránh treo máy
          if (a.readyState < 2) return;
          const newVal = parseFloat(e.target.value);
          a.currentTime=clamp(newVal,0,a.duration); 
          updatePositionState(a); 
        };
        const dblLeft=()=>{ haptic(5); if(a && a.readyState >= 2) a.currentTime=Math.max(0,(a.currentTime||0)-10); updatePositionState(a);};
        const dblRight=()=>{ haptic(5); if(a && a.readyState >= 2) a.currentTime=Math.min(a.duration||0,(a.currentTime||0)+10); updatePositionState(a);};
        
        const RepeatButton = () => {
          let label = 'Lặp: Tắt'; let className = 'btn';
          if (repeat === 'all') { label = 'Lặp: DS'; className += ' btn-primary'; } 
          else if (repeat === 'one') { label = 'Lặp: 1'; className += ' btn-primary'; }
          return e('button', {className: className, onClick: ()=>{haptic();setRepeat(r=> sanitizeRepeat(r==='off'?'all':r==='all'?'one':'off'))}}, 
            Icons.repeat(18), ` ${label}`); 
        };

        return e('div', {className: "fixed inset-0 z-50 bg-[var(--bg)]/98 backdrop-blur-md overflow-y-auto"},
          e('div', {className: "p-4 flex items-center justify-between border-b border-[var(--border)] sticky top-0 bg-[var(--nav-bg)] z-10"},

            e('div', {className: "font-semibold"}, "Đang phát"),
            e('div', {className: "w-10"})

          e('div', {className: "px-6 py-6 pb-20 max-w-xl mx-auto"},
            e('div', {className: "mx-auto w-full max-w-[300px] aspect-square rounded-3xl shadow-xl overflow-hidden relative select-none", style:{background:'var(--gradient)'}},
              e('div', {className: "absolute inset-0 z-10", onDoubleClick: dblLeft}),
              e('div', {className: "absolute inset-0 left-1/2 z-10", onDoubleClick: dblRight}),
              e('img', {src: activeCurrent.artwork||ICON_URL, alt: "", className: "w-full h-full object-cover mix-blend-luminosity pointer-events-none"})
            ),
            e('div', {className: "mt-5 text-center"},
              e('div', {className: "text-2xl font-bold truncate"}, activeCurrent.title),
              e('div', {className: "text-sm text-[var(--muted)] truncate"}, activeCurrent.artist||'minhsutinhquang')
            ),
            e('div', {className: "mt-8 px-1"},
              e('input', {type:"range", min:"0", max:progress.duration||0, step:"0.1", value:progress.current||0, onChange:onSeek, style:{width:'100%', accentColor:'var(--primary)'}}),
              e('div', {className: "mt-1 text-[12px] text-[var(--muted)] flex justify-between"},
                e('span', null, formatTime(progress.current)), e('span', null, formatTime(progress.duration))
              )
            ),
            
            e('div', {className: "mt-6 flex items-center justify-center gap-6"},
              e('button', {className: `btn text-xl p-3 ${shuffle?'btn-primary':''}`, onClick:()=>{haptic();setShuffle(s=>!s)}}, Icons.shuffle(24)), 
              e('button', {className: "btn text-3xl p-3", onClick:prevTrack}, Icons.back(32)), 
              e('button', {className: "btn btn-primary text-4xl p-5 rounded-full", onClick:playPauseUI}, playing?Icons.pause(36):Icons.play(36)), 
              e('button', {className: "btn text-3xl p-3", onClick:nextTrack}, Icons.next(32)), 
              e(RepeatButton, null)
            ),

            e('div', {className: "mt-8 space-y-4"},
              e('div', {className: "p-3 rounded-2xl border border-[var(--border)]"},
                e('div', {className: "flex items-center justify-between mb-2"},
                    e('div', {className: "font-semibold"}, "Âm lượng"),
                    e('span', {className: "chip"}, `${(volume*100|0)}%`)
                ),
                e('input', {type:"range", min:"0", max:"1", step:"0.01", value:volume, onChange:e=>{haptic(8);setVolume(parseFloat(e.target.value))}, style:{accentColor:'var(--primary)'}})
              ),
              e('div', {className: "p-3 rounded-2xl border border-[var(--border)]"},
                e('div', {className: "flex items-center justify-between mb-2"},
                    e('div', {className: "font-semibold"}, "Tốc độ phát"),
                    e('span', {className: "chip"}, `${playbackRate}x`)
                ),
                e('div', {className: "flex gap-2 justify-start"},
                  [0.75,1,1.25,1.5,2.0].map(v=>
                    e('button', {key:v, className: `btn text-sm ${playbackRate===v?'btn-primary':''}`, onClick:()=>{haptic();setPlaybackRate(v)}}, `${v}x`)
                  )
                )
              )
            )
          )
        );
      };

      const MiniPlayer = () => {
        const activeCurrent = playlistRef.current[currentIndexRef.current] || null;
        if (!activeCurrent || needsStart) return null;
        
        return e('div', {
          className: "fixed left-2 right-2 rounded-2xl bg-[var(--card)]/95 border border-[var(--border)] backdrop-blur-md p-2 pt-3 z-50 shadow-[var(--shadow)]",
          style:{bottom:'64px'}
        },
          e('div', {className: "flex items-center justify-between gap-3"},
            e('button', {className: "flex-grow min-w-0 text-left pr-2", onClick: ()=>{haptic();setShowNowPlaying(true)}},
              e('p', {className: "truncate font-semibold"}, activeCurrent.title),
              e('p', {className: "text-xs text-[var(--muted)] truncate"}, activeCurrent.artist||'minhsutinhquang'),
            ),
            
            e('div', {className: "absolute inset-x-0 bottom-1/2 translate-y-1/2 flex justify-center pointer-events-none"},
              e('div', {className: "flex items-center justify-center rounded-full bg-[var(--primary)] text-[var(--primary-fg)] overflow-hidden shadow-lg pointer-events-auto w-3/4 max-w-[200px]"},
                e('button', {className: "w-1/3 h-10 flex items-center justify-center p-2", onClick: ()=>{haptic();prevTrack()}, 'aria-label': "Previous"}, Icons.back(20)), 
                e('button', {className: "w-1/3 h-10 flex items-center justify-center p-2 border-x border-[var(--primary-fg)]/20", onClick: ()=>{haptic();playPauseUI()}, 'aria-label': "Play/Pause"}, playing?Icons.pause(22):Icons.play(22)), 
                e('button', {className: "w-1/3 h-10 flex items-center justify-center p-2", onClick: ()=>{haptic();nextTrack()}, 'aria-label': "Next"}, Icons.next(20)) 
              )
            )
          ),
          e('div', {className: "mt-3 h-1 bg-[var(--muted)]/20 rounded-full"},
            e('div', {className: "h-1 bg-[var(--primary)] rounded-full transition-all duration-500", style:{width:`${progress.duration>0?(progress.current/progress.duration)*100:0}%`}})
          )
        );
      }

      // THIẾT KẾ LẠI GIAO DIỆN POPUP CHÀO MỪNG
      const StartGate = () => needsStart && e('div', {className: "fixed inset-0 z-[99999] flex items-center justify-center bg-[var(--bg)]/95 backdrop-blur overflow-y-auto px-4 py-8"},
        e('div', {className: "p-6 rounded-3xl border border-[var(--border)] bg-[var(--card)] shadow-2xl text-center max-w-sm w-full m-auto"},
          e('img', {src: LOGO_FALLBACK_URL, onError: (e) => { e.target.src = LOGO_PLACEHOLDER; e.target.onError = null; }, width: "72", height: "72", className: "mx-auto mb-4 rounded-2xl shadow-lg border border-[var(--border)]", alt: "MSTQ logo"}),
          
          e('h2', {className: "font-black text-2xl mb-1 text-[var(--text)]"}, "MSTQ Music"),
          
          e('div', {className: "my-5 flex flex-col gap-3"},
            e('p', {className: "text-[0.9rem] text-[var(--text)] font-semibold leading-snug"}, 
                "Bạn hãy chọn Cài đặt App để luôn có được ứng dụng trên máy của bạn."
            ),
            e('div', {className: "bg-[var(--border)]/30 p-4 rounded-2xl border border-[var(--border)]"},
                e('p', {className: "text-[0.8rem] text-[var(--muted)] italic leading-relaxed text-justify"}, 
                    "Sau nhiều năm nghiên cứu phát triển, chúng tôi đã sử dụng kỹ thuật công nghệ cập nhật mới nhất để bạn được nghe nhạc chạy nền liên tục, không bao giờ ngắt quãng."
                ),
                e('p', {className: "text-[0.75rem] font-bold mt-3 text-emerald-500 uppercase tracking-wide"}, 
                    "Từ ngày 11 Tháng 3 Năm 2026"
                ),
                e('p', {className: "text-[0.85rem] font-bold text-[var(--primary)] mt-1"}, 
                    "Bởi Tịnh Hải"
                )
            ),
            e('p', {className: "text-xs font-medium text-rose-500 animate-pulse mt-1"}, 
                loading ? "Đang tải dữ liệu, vui lòng đợi..." : `Hộp thoại sẽ tự động đóng sau ${startCountdown} giây...`
            )
          ),
          
          e('div', {className: "flex gap-3 justify-center mt-2"},
            e('button', {className: "btn flex-1 bg-slate-800 text-white border-slate-700 hover:bg-slate-700 font-semibold", onClick: askInstall}, "Cài đặt App"),
            e('button', {
                className: "btn btn-primary flex-1 font-bold shadow-lg shadow-[var(--primary)]/20", 
                disabled: loading,
                onClick: handleManualStart
            }, loading ? "Đang tải..." : `Bắt đầu (${startCountdown}s)`)
          )
        )
      );

      const title = tab==='home'?'Trang chủ':tab==='search'?'Tìm kiếm':tab==='settings'?'Cài đặt':tab==='queue'?'Hàng đợi':'';

      return e('div', {className: "min-h-screen", onClick: ()=>setLinksOpen(false), style:{paddingTop:64, paddingBottom:(current?188:104)}},
        e(TopBar, {title, askInstall, linksOpen, setLinksOpen, setTheme}),
        e(StartGate, null),
        toast && e('div', {className: "toast-container"}, e('div', {className: "toast-tet"}, toast)),
        tab==='home' && e(HomeTab, null),
        tab==='search' && e(SearchTab, null),
        tab==='settings' && e(SettingsTab, null),
        tab==='queue' && e(QueueTab, null),
        e('nav', {className: "tabbar safe-bottom"},
          e('div', {className: "flex"},
            e('button', {className: "tabbtn", 'aria-current':tab==='home', onClick:()=>{haptic();setTab('home')}}, Icons.home(20), e('span', null, "Trang chủ")), 
            e('button', {className: "tabbtn", 'aria-current':tab==='search', onClick:()=>{haptic();setTab('search')}}, Icons.search(20), e('span', null, "Tìm kiếm")), 
            e('button', {className: "tabbtn", 'aria-current':tab==='settings', onClick:()=>{haptic();setTab('settings')}}, Icons.settings(20), e('span', null, "Cài đặt")), 
            e('button', {className: "tabbtn", 'aria-current':tab==='queue', onClick:()=>{haptic();setTab('queue')}}, Icons.queue(20), e('span', null, "Hàng đợi"))
          )
        ),
        e(MiniPlayer, null),
        showNowPlaying && !needsStart && e(NowPlaying, null)
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App, null));
  </script>

  </div>

  <script>
      const logicCore = {
          deferredPrompt: null,
          repoPath: '/PlayMusic', 
          state: {
              isIOS: /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase()),
              isAndroid: /android/.test(navigator.userAgent.toLowerCase()),
              isPC: !/iphone|ipad|ipod|android/i.test(navigator.userAgent),
              isInApp: /FBAN|FBAV|Instagram|Zalo/i.test(navigator.userAgent),
              isStandalone: window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone,
          },
          init: function() {
              if ('serviceWorker' in navigator) {
                  navigator.serviceWorker.register(`${this.repoPath}/sw.js?v=${Date.now()}`)
                      .then(() => console.log("✅ PWA Engine: SW Registered"))
                      .catch(err => console.warn("❌ PWA Engine: SW Fail", err));
              }
              this.updateUI('init');
              if (this.state.isStandalone) {
                  this.updateUI('installed');
              } else {
                  window.addEventListener('beforeinstallprompt', (e) => {
                      e.preventDefault();
                      this.deferredPrompt = e;
                      this.showSmartFAB();
                      this.updateUI('ready');
                  });
              }
              window.pwaEngine = this;
          },
          updateUI: function(status) {
              const dot = document.getElementById('pwaStatusDot');
              if (dot) {
                  dot.className = "status-dot"; 
                  if (status === 'init') dot.classList.add('dot-yellow');
                  else if (status === 'ready') dot.classList.add('dot-red');
                  else if (status === 'installed') dot.classList.add('dot-green');
              }
          },
          showSmartFAB: function() {
              if (this.state.isStandalone) return;
              const fab = document.getElementById('btnInstall');
              if(fab) {
                  fab.style.display = 'flex';
                  fab.onclick = () => this.handleInstallClick();
              }
          },
          handleInstallClick: async function() {
              const modal = document.getElementById('pwaHealthModal');
              const content = document.getElementById('smartGuideContent');
              const arrow = document.getElementById('iosArrow');
              if(!modal || !content) return;
              modal.classList.remove('hidden');
              if(arrow) arrow.classList.add('hidden');

              if (this.state.isStandalone) {
                  content.innerHTML = `<div class="text-center"><div class="text-green-500 text-5xl mb-3">🎉</div><h3 class="text-xl font-bold text-gray-800 mb-2">Đã cài đặt thành công!</h3><p class="text-gray-600">Bác đang sử dụng phiên bản Ứng dụng.<br>Chúc bác nghe nhạc vui vẻ ạ.</p></div>`;
                  return;
              }
              if (this.deferredPrompt) {
                  modal.classList.add('hidden');
                  this.deferredPrompt.prompt();
                  const { outcome } = await this.deferredPrompt.userChoice;
                  if (outcome === 'accepted') {
                      this.deferredPrompt = null;
                      const fab = document.getElementById('btnInstall');
                      if(fab) fab.style.display = 'none';
                  }
                  return;
              }
              if (this.state.isInApp) {
                  content.innerHTML = `<div class="text-center text-red-600 font-bold mb-3">⚠️ Cảnh Báo Trình Duyệt</div><p class="mb-3 text-sm">Bác đang mở bằng Zalo/Facebook nên không cài được ạ.</p><div class="guide-step bg-yellow-50 p-2 rounded border border-yellow-200 text-left"><div class="step-num">1</div><div>Bấm dấu <b>3 chấm</b> <span class="text-xl">⋯</span> ở góc trên phải.</div></div><div class="guide-step bg-yellow-50 p-2 rounded border border-yellow-200 text-left"><div class="step-num">2</div><div>Chọn <b>Mở bằng trình duyệt</b> (Chrome/Safari).</div></div>`;
                  return;
              }
              if (this.state.isIOS) {
                  content.innerHTML = `<div class="text-center font-bold mb-2 text-blue-600">Dành cho iPhone/iPad</div><div class="guide-step"><div class="step-num">1</div><div>Bấm nút <b>Chia sẻ</b> <i class="text-blue-500 text-xl">⎋</i> ở dưới cùng.</div></div><div class="guide-step"><div class="step-num">2</div><div>Kéo lên chọn <b>Thêm vào MH chính</b>.</div></div><div class="guide-step"><div class="step-num">3</div><div>Bấm nút <b>Thêm</b> ở góc trên cùng.</div></div>`;
                  if(arrow) arrow.classList.remove('hidden');
                  return;
              }
              if (this.state.isAndroid) {
                  content.innerHTML = `<div class="text-center font-bold mb-2 text-green-600">Dành cho Android</div><div class="guide-step"><div class="step-num">1</div><div>Bấm dấu <b>3 chấm</b> <span class="text-xl">⋮</span> ở góc trên bên phải.</div></div><div class="guide-step"><div class="step-num">2</div><div>Chọn <b>Cài đặt ứng dụng</b> hoặc <b>Thêm vào màn hình chính</b>.</div></div>`;
                  return;
              }
              if (this.state.isPC) {
                    content.innerHTML = `<div class="text-center"><p class="mb-3 font-bold text-lg">Cài đặt trên Máy tính</p><div class="bg-blue-50 p-4 rounded-xl border border-blue-200 inline-block mb-3 text-left"><div class="flex items-center gap-3 mb-2"><span class="text-2xl">⊕</span> <span>Bấm biểu tượng <b>Cài đặt</b> ở cuối thanh địa chỉ (trên cùng bên phải).</span></div><div class="text-sm text-gray-500 italic ml-8">Hoặc bấm menu 3 chấm > "Cài đặt MSTQ Music..."</div></div></div>`;
                  return;
              }
          }
      };
      document.addEventListener('DOMContentLoaded', () => logicCore.init());
  </script>
</body>
</html>
